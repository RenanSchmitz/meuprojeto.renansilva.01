<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Cadastro de Alunos</h1>
    </header>
    <main>
        <section>
            <h2> Formulário de Cadastro</h2>
            <form action=" " method="post" name="cadastro_aluno" id="cadastro_aluno">
                <label for="nome_aluno">Nome do Aluno:</label>
                <input type="text" id="nome_aluno" name="nome_aluno" size="20" required>
                <br> <br> 
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" size="20" required> 
                <br> <br> 
                <label for="rg">Registro Geral:</label>
                <input type="text" id="rg" name="rg" size="20" required>
                <br> <br> 
                <label for="endereço">Endereço:</label>
                <input type="text" id="endereço" name="endereço" size="20" required>
            </form>
        </section>
    </main>
    <footer>
        <p> Instituto Federal do Paraná Campus Capanema</p>
        <p> 2026</p>
    </footer>
    
</body>
</html>
